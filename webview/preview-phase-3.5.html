<!doctype html>
<!--
  jito-ide v0.2.0 — Phase 3.5 visual smoke test
  ==============================================
  Exercises the SettingsPage webview component. The preview:

    1. Loads the production-bundled webview (webview/dist/assets/index.js)
       so the actual React component + CSS tokens ship in the screenshot.
    2. Mocks acquireVsCodeApi() since we're outside VS Code.
    3. Sets window.__JITO_VIEW__ = 'settings' so main.tsx routes to <SettingsPage/>.
    4. Replies to IPC `load` messages with a mock SettingsState so the page
       renders without an actual extension host behind it.

  Section list:
    ① Loaded state          — page with mock data (default mode + theme)
    ② Dirty state           — user edited a field, footer shows "Unsaved"
    ③ API-key masked        — key configured, masked dots in placeholder
    ④ Custom model          — Model picker in custom-input mode
    ⑤ Save success          — footer shows "Saved." with green dot

  Open: just open this file in a browser. For headless screenshot:
    node assets/smoke-phase-3.5.mjs
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>jito ⚡ Phase 3.5 — SettingsPage smoke test</title>

  <!-- Mock acquireVsCodeApi BEFORE any bundle loads so the bundle sees it. -->
  <script>
    (() => {
      const listeners = new Set();
      const state = {
        // Initial state — matches a typical first-time install.
        apiKeySet: false,
        model: 'minimax/MiniMax-M3',
        defaultMode: 'dev',
        telemetry: false,
        theme: 'dark',
      };
      window.__MOCK_SETTINGS_STATE__ = state;
      window.__MOCK_SETTINGS_MODE__ = 'default'; // change to 'dirty' / 'saved' / 'apikey' / 'custom' via URL ?mode=
      window.acquireVsCodeApi = () => ({
        postMessage(msg) {
          console.log('[mock-vscode] →', msg);
          if (msg.type === 'load') {
            // Reply asynchronously, like a real host.
            setTimeout(() => {
              const ev = new MessageEvent('message', { data: { type: 'state', payload: window.__MOCK_SETTINGS_STATE__ } });
              window.dispatchEvent(ev);
            }, 5);
          } else if (msg.type === 'submit') {
            // Reflect the saved state back.
            const p = msg.payload || {};
            if (p.model) state.model = p.model;
            if (p.defaultMode) state.defaultMode = p.defaultMode;
            state.telemetry = !!p.telemetry;
            if (p.theme) state.theme = p.theme;
            if (p.apiKey) state.apiKeySet = true;
            setTimeout(() => {
              const ev = new MessageEvent('message', { data: { type: 'saveResult', payload: { ok: true } } });
              window.dispatchEvent(ev);
            }, 10);
          } else if (msg.type === 'reset') {
            Object.assign(state, {
              apiKeySet: state.apiKeySet, // do not clear the key
              model: 'minimax/MiniMax-M3',
              defaultMode: 'dev',
              telemetry: false,
              theme: 'dark',
            });
            setTimeout(() => {
              const ev = new MessageEvent('message', { data: { type: 'state', payload: state } });
              window.dispatchEvent(ev);
            }, 5);
          }
        },
        getState() { return null; },
        setState() {},
      });
    })();

    // Tell main.tsx to render SettingsPage instead of App.
    window.__JITO_VIEW__ = 'settings';
  </script>

  <!-- Phase 1.2 — Geist + Geist Mono via Google Fonts CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bundle CSS (built by vite → webview/dist/assets/index.css) -->
  <link rel="stylesheet" href="./dist/assets/index.css" />

  <style>
    body { margin: 0; padding: 0; background: var(--bg-canvas); color: var(--fg-primary); }
    .preview-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Production bundle (vite build → webview/dist/assets/index.js).
       Contains React + App + SettingsPage in 36 modules. -->
  <script src="./dist/assets/index.js"></script>
</body>
</html>
