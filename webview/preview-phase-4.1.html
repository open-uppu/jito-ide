<!doctype html>
<!--
  jito-ide v0.2.0 — Phase 4.1 visual smoke test (Composer)
  ========================================================
  Renders the full chat App (which contains the new Composer) and lets the
  puppeteer harness drive different visual states by:
    - typing into the textarea   (empty → with text → multi-line → max-cap)
    - clicking the "slash" toolbar button   (palette open)
    - clicking the App "send" button (disabled)
    - setting window.__DISABLED__ = true (host busy → composer disabled)

  This is the same pattern used by Phase 3.3/3.5 smoke previews.
  Open: just open this file in a browser. For headless screenshot:
    node assets/smoke-phase-4.1.mjs
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jito ⚡ Phase 4.1 — Composer smoke test</title>

  <!-- Mock acquireVsCodeApi BEFORE any bundle loads so the bundle sees it. -->
  <script>
    (() => {
      // Dispatch a real MessageEvent so App.tsx's window message listener picks it up.
      const fire = (data) => {
        const ev = new MessageEvent('message', { data });
        window.dispatchEvent(ev);
      };
      window.__MOCK_FIRE__ = fire;  // expose for the smoke harness
      window.acquireVsCodeApi = () => ({
        postMessage(msg) {
          console.log('[mock-vscode] →', msg);
          if (msg.type === 'send') {
            // Echo the user message back so App.tsx flips busy=true and the
            // Composer receives `disabled={true}`. The smoke harness can then
            // verify the visual disabled state without standing up a real host.
            fire({
              type: 'message',
              payload: {
                id: 'mock-' + Date.now(),
                role: 'user',
                content: msg.payload && msg.payload.text ? msg.payload.text : '',
                timestamp: Date.now(),
              },
            });
          }
        },
        getState() { return null; },
        setState() {},
      });
      // Tell main.tsx to render the chat App (which contains <Composer/>).
      window.__JITO_VIEW__ = 'chat';
    })();
  </script>

  <!-- Phase 1.2 — Geist + Geist Mono via Google Fonts CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bundle CSS (built by vite → webview/dist/assets/index.css) -->
  <link rel="stylesheet" href="./dist/assets/index.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-canvas);
      color: var(--fg-primary);
      font-family: var(--font-ui);
    }
  </style>
</head>
<body>
  <div id="root" style="height: 100vh;"></div>
  <!-- Production bundle (vite build → webview/dist/assets/index.js). -->
  <script src="./dist/assets/index.js"></script>
</body>
</html>
