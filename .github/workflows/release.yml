# .github/workflows/release.yml
#
# Cross-platform VSIX build matrix for jito-ide v0.2.0.
#
# Spec: companies/jito-ide.md §v0.2.0 Roadmap, card
#   "jito-ide v0.2.0 — Phase 6.2: VSIX Package + Cross-platform CI (5 builds)".
#
# Matrix is an explicit `include` map (not os × arch with exclude) so each
# cell carries both the *runner* and the matching `vsce --target` triple.
# This is more robust because:
#   - ubuntu-latest is x64-only; we need ubuntu-24.04-arm for a true arm64 build.
#   - macos-latest is Apple Silicon (arm64); macos-13 is the last Intel (x64) runner.
#   - Windows arm64 (`windows-11-arm`) is omitted per card spec — compat
#     with `@vscode/vsce` `--target win32-arm64` is unreliable for pure-JS
#     extensions and not worth a 6th cell.
#
# Cells (5 total):
#   1. ubuntu-latest       → linux-x64
#   2. ubuntu-24.04-arm    → linux-arm64
#   3. macos-13            → darwin-x64
#   4. macos-latest        → darwin-arm64
#   5. windows-latest      → win32-x64
#
# Triggers:
#   - push of tag v*      → full matrix + (optional) publish + GH Release
#   - workflow_dispatch   → manual run, build-only by default
#   - pull_request        → quick matrix, no publish (so the 5 cells are
#                           visible in the PR's workflow run before merge)
#
# Required secrets (set in repo Settings → Secrets) for publish only:
#   VSCE_PAT              — VS Marketplace Personal Access Token
#                           (Azure DevOps, scope: Marketplace Manage)

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip publish step (build + attach only)'
        required: false
        default: 'true'
  pull_request:
    paths:
      - 'src/**'
      - 'webview/src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'webview/package.json'
      - 'webview/package-lock.json'
      - '.github/workflows/release.yml'
      - '.vscodeignore'

# Cancel superseded PR runs on the same ref; tag runs must run to completion.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write   # needed for GH Release + artifact upload on tag pushes

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-latest
            target: linux-x64
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            target: linux-arm64
          - label: darwin-x64
            runner: macos-13
            target: darwin-x64
          - label: darwin-arm64
            runner: macos-latest
            target: darwin-arm64
          - label: win32-x64
            runner: windows-latest
            target: win32-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            webview/package-lock.json

      - name: Show toolchain
        shell: bash
        run: |
          node --version
          npm --version
          npx --yes @vscode/vsce --version
          uname -a 2>/dev/null || ver
          echo "matrix: ${{ matrix.label }} on ${{ matrix.runner }}"

      - name: Install root deps
        run: npm ci

      - name: Build extension host (tsc)
        run: npx tsc -p ./

      - name: Install webview deps
        working-directory: webview
        run: npm ci

      - name: Build webview (vite)
        working-directory: webview
        run: npm run build

      - name: Validate package.json
        run: |
          node -e "
            const p = require('./package.json');
            const required = ['name','displayName','description','version','publisher','engines','main'];
            for (const k of required) {
              if (!p[k]) throw new Error('package.json missing required field: '+k);
            }
            if (!/^0\.\d+\.\d+/.test(p.version)) throw new Error('version not semver: '+p.version);
            if (p.publisher !== 'uppu') throw new Error('publisher must be \"uppu\", got: '+p.publisher);
            console.log('OK', p.name+'@'+p.version, 'publisher='+p.publisher, 'main='+p.main);
          "

      - name: Package VSIX (per-target)
        run: |
          mkdir -p dist
          npx --yes @vscode/vsce package \
            --target ${{ matrix.target }} \
            --no-dependencies \
            --out "dist/jito-ide-${{ matrix.label }}.vsix"

      - name: Verify VSIX contents
        shell: bash
        run: |
          VSIX="dist/jito-ide-${{ matrix.label }}.vsix"
          test -s "$VSIX" || (echo "VSIX missing"; exit 1)
          # Sanity: entry file is inside the package
          unzip -l "$VSIX" | grep -E "extension/out/extension\.js" >/dev/null
          # Sanity: package.json says what we expect
          VERSION_FROM_VSIX=$(unzip -p "$VSIX" extension/package.json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).version))")
          if [ "$VERSION_FROM_VSIX" != "$(node -p "require('./package.json').version")" ]; then
            echo "::error::VSIX version mismatch: embedded=$VERSION_FROM_VSIX package=$(node -p "require('./package.json').version")"
            exit 1
          fi
          echo "VSIX verified: $(du -h $VSIX | cut -f1) version=$VERSION_FROM_VSIX"

      - name: Upload VSIX as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.label }}
          path: dist/jito-ide-${{ matrix.label }}.vsix
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish to VS Marketplace
    needs: build
    # Only run on tag pushes, and only after every matrix cell succeeds.
    # workflow_dispatch / pull_request runs are build-only by design.
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify VSCE_PAT
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT secret is empty — cannot publish."
            exit 1
          fi
          npx --yes @vscode/vsce verify-pat "${{ github.event.repository.owner }}"

      - name: Publish VSIX (canonical = linux-x64)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          # For a pure-JS extension the per-platform VSIX files are
          # functionally identical; pick linux-x64 as the canonical artifact
          # that vsce signs + uploads to the Marketplace.
          VSIX="dist/jito-ide-linux-x64.vsix"
          if [ ! -s "$VSIX" ]; then
            echo "::error::canonical VSIX missing: $VSIX"
            ls -la dist/ || true
            exit 1
          fi
          echo "Publishing $VSIX"
          npx --yes @vscode/vsce publish --packagePath "$VSIX" --no-dependencies

      - name: Attach all VSIX + release notes to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.vsix