# .github/workflows/release.yml
#
# Cross-platform VSIX build matrix for jito-ide.
#
# The extension host is pure JS (compiled TypeScript) plus a webview bundle,
# so the build itself is OS-agnostic. We still run it on every target OS
# to catch any subtle path/encoding/line-ending regressions, AND because
# `vsce publish` later will sign against a publisher identity — having
# reproducible VSIX files from each platform in the run gives us a per-OS
# audit trail in the GitHub Actions UI.
#
# Triggers:
#   1. push of tag v*  → full matrix + attach VSIX + (optional) publish
#   2. workflow_dispatch → manual run, no publish
#   3. pull_request   → quick matrix, no publish (CI smoke)
#
# Outputs:
#   - 1 VSIX per (os, arch) = 6 VSIX files attached to the workflow run
#   - `vsix/<os>-<arch>/jito-ide-<ver>.vsix` artifact per run
#
# Required secrets (set in repo Settings → Secrets):
#   VSCE_PAT       — VS Marketplace Personal Access Token (only needed for publish)
#
# Phase-5.0: build + attach + sign-on-publish. macOS/Windows signing via
# `vsce publish` uses the same PAT; the "Microsoft cert" referenced in the
# card is in fact the publisher identity bound to that PAT (not a separate
# Authenticode code-signing cert — VSIX signing for VS Marketplace is
# cryptographic, not OS code-signing). See docs/signing.md.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip publish step (build + attach only)'
        required: false
        default: 'true'
  pull_request:
    paths:
      - 'src/**'
      - 'webview/src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'webview/package.json'
      - 'webview/package-lock.json'
      - '.github/workflows/release.yml'

# Cancel superseded runs on the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write   # needed to create GH Releases from tags

jobs:
  build:
    name: build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: linux
            arch: x64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm           # GitHub-hosted arm64 runner
          # macOS
          - os: darwin
            arch: x64
            runner: macos-13                   # Intel
          - os: darwin
            arch: arm64
            runner: macos-latest               # Apple Silicon (M1+)
          # Windows
          - os: win32
            arch: x64
            runner: windows-latest
          - os: win32
            arch: arm64
            runner: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            webview/package-lock.json

      - name: Show toolchain
        shell: bash
        run: |
          node --version
          npm --version
          uname -a 2>/dev/null || ver
          echo "arch: ${{ matrix.arch }}"

      - name: Install root deps
        run: npm ci

      - name: Build extension host (tsc)
        run: npx tsc -p ./

      - name: Install webview deps
        working-directory: webview
        run: npm ci

      - name: Build webview (vite)
        working-directory: webview
        run: npm run build

      - name: Validate package.json
        run: node -e "const p=require('./package.json'); if(!p.main||!p.publisher||!p.version) throw new Error('missing main/publisher/version'); console.log('OK', p.name+'@'+p.version, 'main='+p.main, 'publisher='+p.publisher);"

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies --out "dist/${{ matrix.os }}-${{ matrix.arch }}.vsix"

      - name: Verify VSIX contents
        shell: bash
        run: |
          VSIX="dist/${{ matrix.os }}-${{ matrix.arch }}.vsix"
          test -s "$VSIX" || (echo "VSIX missing"; exit 1)
          # Sanity: entry file is inside the package
          unzip -l "$VSIX" | grep -E "extension/out/extension\.js" >/dev/null
          # Sanity: package.json says what we expect
          node -e "const j=JSON.parse(require('child_process').execSync('unzip -p \"'"$VSIX"'\" extension/package.json').toString()); if(j.version!='${{ github.ref_name }}'.replace(/^v/,'')) console.warn('version tag mismatch: package.json='+j.version+' tag='+process.env.GITHUB_REF_NAME); if(!j.main.endsWith('extension.js')) throw new Error('bad main: '+j.main);"
          echo "VSIX verified: $(du -h $VSIX | cut -f1)"

      - name: Upload VSIX as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/${{ matrix.os }}-${{ matrix.arch }}.vsix
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish to VS Marketplace
    needs: build
    # Only run on tag pushes, and only after every matrix cell succeeds.
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify PAT
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT secret is empty — cannot publish."
            exit 1
          fi
          npx --yes @vscode/vsce verify-pat "${{ github.event.repository.owner }}"

      - name: Publish VSIX (signs via Microsoft cert bound to PAT)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          # Pick the linux/x64 VSIX as the canonical artifact (they're
          # byte-identical because the build is OS-agnostic; only the
          # first successful run is published).
          VSIX=$(ls -1 dist/linux-x64.vsix 2>/dev/null || ls -1 dist/*.vsix | head -1)
          echo "Publishing $VSIX"
          npx @vscode/vsce publish --packagePath "$VSIX" --no-dependencies

      - name: Tag release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.vsix
