<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {%- seo -%}
  <link rel="icon" href="{{ site.baseurl }}/assets/favicon.ico">
  <style>
    :root {
      --color-jito: #00E5FF;
      --color-dev: #00A3FF;
      --color-reason: #A855F7;
      --color-create: #FF1B6B;
      --color-audit: #F97316;
      --color-universal: #00E5FF;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .jito-banner {
      background: linear-gradient(135deg, #0B1220 0%, #1a2236 100%);
      color: #fff; padding: 3rem 1rem; text-align: center;
    }
    .jito-banner h1 { color: var(--color-jito); margin: 0; }
    .jito-modes { display: flex; justify-content: center; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
    .jito-mode-pill {
      display: inline-block; padding: 0.4rem 0.9rem; border-radius: 1rem;
      color: #fff; font-weight: 600; font-size: 0.85rem; text-transform: uppercase;
    }
    .jito-mode-pill--dev { background: var(--color-dev); }
    .jito-mode-pill--reason { background: var(--color-reason); }
    .jito-mode-pill--create { background: var(--color-create); }
    .jito-mode-pill--audit { background: var(--color-audit); }
    .jito-mode-pill--universal { background: var(--color-universal); color: #0B1220; }
    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    table { width: 100%; }
    .btn-install {
      display: inline-block; background: var(--color-jito); color: #0B1220;
      padding: 0.7rem 1.4rem; border-radius: 0.5rem; text-decoration: none;
      font-weight: 600; margin: 0.3rem;
    }
    .btn-install:hover { background: #7CD8FF; }
    pre { background: #0B1220; color: #00E5FF; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
    code { background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 0.2rem; }
    pre code { background: transparent; padding: 0; }
  </style>
</head>
<body>
  <header class="jito-banner">
    <h1>jito ⚡🖥️</h1>
    <p>Multi-mode AI for your editor. 5 first-class modes, one extension.</p>
    <div class="jito-modes">
      <span class="jito-mode-pill jito-mode-pill--dev">dev</span>
      <span class="jito-mode-pill jito-mode-pill--reason">reason</span>
      <span class="jito-mode-pill jito-mode-pill--create">create</span>
      <span class="jito-mode-pill jito-mode-pill--audit">audit</span>
      <span class="jito-mode-pill jito-mode-pill--universal">universal</span>
    </div>
    <p>
      <a class="btn-install" href="https://marketplace.visualstudio.com/items?itemName=uppu.jito-ide">Install from VS Marketplace</a>
      <a class="btn-install" href="https://github.com/open-uppu/jito-ide">Source on GitHub</a>
    </p>
  </header>
  <main>{{ content }}</main>
</body>
</html>
