<?xml version="1.0" encoding="UTF-8"?>
<!--
  jito — primary horizontal logo
  ViewBox 200x60.

  Layout:
    [0..6]   left margin
    [6..56]  bolt mark, 50 wide × 56 tall, y 4..60
    [64..74] gap
    [74..194] 'jito' wordmark (Geist 700, ~32px tall)
    [194..200] right margin

  Palette:
    ink   #0B1220   dark fill (bolt interior, dark theme bg)
    cyan  #00E5FF   primary stroke, PCB pads, 'i' dot
    mag   #FF2E92   accent — single hot point (spark origin, top-right of bolt)
    text  #E6F7FB   wordmark color (soft white-cyan, reads on dark)

  All angles are 90° or 45° (no curves, no organic shapes).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 60"
     width="200" height="60"
     role="img"
     aria-label="jito — fast AI dev tool">
  <title>jito</title>

  <!-- ============================================================
       BOLT MARK
       Same 7-vertex bolt as logo-mark.svg, offset to fit the left
       of the 200x60 viewbox.  Bolt local grid: 46x56, offset (6, 2).
       ============================================================ -->
  <g transform="translate(6 2)" aria-hidden="true">
    <path
      d="M 24 0 L 46 0 L 16 28 L 32 28 L 6 56 L 30 28 L 14 28 Z"
      fill="#0B1220"
      stroke="#00E5FF"
      stroke-width="2"
      stroke-linejoin="miter"
      stroke-linecap="square" />

    <!-- magenta hot-point: top-right corner of bolt, the "spark origin" -->
    <rect x="44" y="0" width="4" height="4" fill="#FF2E92" />

    <!-- bottom PCB-pad terminal: small cyan square just above the tip
         (y=50 keeps it well inside the 60-tall viewBox; the bolt tip
         itself is at local y=56, viewBox y=58) -->
    <rect x="3" y="50" width="4" height="4" fill="#00E5FF" />

    <!-- circuit trace: a thin horizontal cyan line from bolt's mid-right
         to a small terminal pad — adds the "PCB / circuit" register -->
    <line x1="46" y1="24" x2="54" y2="24"
          stroke="#00E5FF" stroke-width="1.5" stroke-linecap="square" />
    <rect x="54" y="22" width="4" height="4" fill="#00E5FF" />
  </g>

  <!-- ============================================================
       WORDMARK
       'jito' in Geist 700, lowercase, font-size 32, baseline y=42.
       x=68, baseline 42 → text top ~y=18, descender of 'j' goes to y=50.
       The default 'i' dot is overwritten by a square cyan dot for
       brand consistency with the bolt.
       ============================================================ -->
  <g>
    <text x="68" y="42"
          font-family="Geist, 'Geist Sans', Inter, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700"
          font-size="32"
          letter-spacing="-1.2"
          fill="#E6F7FB">jito</text>
    <!-- brand-cyan square dot above the 'i'.
         With letter-spacing -1.2 and Geist metrics, 'i' stem sits
         around x=82.5. We place a 3.5x3.5 cyan square there. -->
    <rect x="82.5" y="16" width="3.5" height="3.5" fill="#00E5FF" />
  </g>
</svg>
