<?xml version="1.0" encoding="UTF-8"?>
<!--
  jito — monochrome (white) horizontal logo for dark backgrounds.
  Same geometry as logo.svg, but in pure white (#FFFFFF) with
  no magenta accent.  Use this when:
    - dark theme is locked
    - print contexts (no second color)
    - the magenta accent would compete with other UI color
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 60"
     width="200" height="60"
     role="img"
     aria-label="jito — fast AI dev tool">
  <title>jito</title>

  <!-- bolt: white stroke, no fill (lets bg show through) -->
  <g transform="translate(6 2)" aria-hidden="true">
    <path
      d="M 24 0 L 46 0 L 16 28 L 32 28 L 6 56 L 30 28 L 14 28 Z"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="2"
      stroke-linejoin="miter"
      stroke-linecap="square" />

    <!-- bottom terminal pad (positioned inside the viewBox) -->
    <rect x="3" y="50" width="4" height="4" fill="#FFFFFF" />

    <!-- circuit trace + terminal pad -->
    <line x1="46" y1="24" x2="54" y2="24"
          stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="square" />
    <rect x="54" y="22" width="4" height="4" fill="#FFFFFF" />
  </g>

  <!-- wordmark + cyan 'i' dot retained for brand recall even in mono -->
  <g>
    <text x="68" y="42"
          font-family="Geist, 'Geist Sans', Inter, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700"
          font-size="32"
          letter-spacing="-1.2"
          fill="#FFFFFF">jito</text>
    <rect x="82.5" y="16" width="3.5" height="3.5" fill="#FFFFFF" />
  </g>
</svg>
