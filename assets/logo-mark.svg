<?xml version="1.0" encoding="UTF-8"?>
<!--
  jito — square mark (sidebar icon, marketplace, app tile)
  ViewBox 64x64.  Bolt occupies a 50x56 area, centered (x 7..57, y 4..60).
  Same geometry as logo.svg, but with the wordmark stripped and
  re-centered on a square canvas.
  Reads cleanly at 16x16 (favicon) up to 512x512 (marketplace hero).

  Bolt design: classic 7-vertex asymmetric Z-bolt with a clear horizontal
  mid-step.  Bolt body is 46 wide × 56 tall in its own local grid,
  offset (9, 4) → real coords x 9..55, y 4..60.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64" height="64"
     role="img"
     aria-label="jito">
  <title>jito</title>

  <!--
    Local bolt grid: 46 wide × 56 tall.
    Vertices (counter-clockwise around the silhouette, then Z):
      A (24, 0)   top edge, left
      B (46, 0)   top edge, right   (top edge = 22px wide)
      C (16, 28)  inner corner of upper wedge (descends to mid)
      D (32, 28)  step-out on right side  (mid-step = 16px wide, 4px tall)
      E ( 6, 56)  bottom tip (sharp)
      F (30, 28)  inner corner of lower wedge (ascent to mid)
      G (14, 28)  step-out on left side
  -->
  <g transform="translate(9 4)">
    <!-- main bolt body -->
    <path
      d="M 24 0 L 46 0 L 16 28 L 32 28 L 6 56 L 30 28 L 14 28 Z"
      fill="#0B1220"
      stroke="#00E5FF"
      stroke-width="2.5"
      stroke-linejoin="miter"
      stroke-linecap="square" />

    <!-- magenta spark origin (top-right corner of bolt) -->
    <rect x="44" y="0" width="4" height="4" fill="#FF2E92" />

    <!-- bottom PCB-pad terminal: small cyan square just above the tip
         (positioned inside the 64x64 viewBox) -->
    <rect x="3" y="50" width="4" height="4" fill="#00E5FF" />
  </g>
</svg>
